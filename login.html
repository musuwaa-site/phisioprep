<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - PhysioPrep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('activeSession') || sessionStorage.getItem('activeSession')) {
            window.location.replace('index.html');
        }
    </script>
    <style>
        .tab-active {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .tab-inactive {
            color: #4b5563;
        }
        .tab-inactive:hover {
            color: #111827;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 selection:bg-indigo-100 selection:text-indigo-900">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 text-white rounded-xl mb-4 shadow-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-900 tracking-tight" id="form-title">Welcome Back</h2>
                <p class="text-sm text-slate-500 mt-2" id="form-subtitle">Enter your details to access your account.</p>
            </div>

            <div class="flex p-1 bg-slate-100 rounded-lg mb-6 relative">
                <button onclick="switchView('login')" id="btn-login" class="flex-1 py-2 text-sm font-bold rounded-md transition-all duration-200 tab-active">Login</button>
                <button onclick="switchView('signup')" id="btn-signup" class="flex-1 py-2 text-sm font-bold rounded-md transition-all duration-200 tab-inactive">Create Account</button>
            </div>

            <!-- Custom Notification Box (Replaces alert) -->
            <div id="error-message" class="hidden mb-6 p-4 bg-rose-50 text-rose-700 text-sm font-medium rounded-lg border border-rose-200 text-center animate-pulse"></div>

            <form id="login-form" class="space-y-5 transition-all duration-300" onsubmit="handleLogin(event)">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Email address</label>
                    <input type="email" id="login-email" required class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                    <input type="password" id="login-password" required class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400" placeholder="••••••••">
                </div>
                <div class="flex items-center">
                    <input id="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded cursor-pointer transition-colors">
                    <label for="remember-me" class="ml-2 block text-sm font-medium text-slate-700 cursor-pointer">Remember me</label>
                </div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 rounded-xl shadow-md text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all transform hover:-translate-y-0.5">Sign in</button>
            </form>

            <form id="signup-form" class="hidden space-y-5 transition-all duration-300" onsubmit="handleSignup(event)">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Email address</label>
                    <input type="email" id="signup-email" required class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Create Password</label>
                    <input type="password" id="signup-password" required class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400" placeholder="Strong password">
                </div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 rounded-xl shadow-md text-sm font-bold text-white bg-slate-900 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-all transform hover:-translate-y-0.5 mt-2">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        const MASTER_ADMIN = { email: 'officialmusuwaa@gmail.com', password: 'physiologist', role: 'admin' };
        let registeredUsers = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        
        if (!registeredUsers.find(user => user.email === MASTER_ADMIN.email)) {
            registeredUsers.push(MASTER_ADMIN);
            localStorage.setItem('registeredUsers', JSON.stringify(registeredUsers));
        }

        function switchView(view) {
            hideMessage();
            if (view === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('signup-form').classList.add('hidden');
                document.getElementById('btn-login').classList.replace('tab-inactive', 'tab-active');
                document.getElementById('btn-signup').classList.replace('tab-active', 'tab-inactive');
                document.getElementById('form-title').innerText = 'Welcome Back';
                document.getElementById('form-subtitle').innerText = 'Enter your details to access your account.';
            } else {
                document.getElementById('signup-form').classList.remove('hidden');
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('btn-signup').classList.replace('tab-inactive', 'tab-active');
                document.getElementById('btn-login').classList.replace('tab-active', 'tab-inactive');
                document.getElementById('form-title').innerText = 'Create Account';
                document.getElementById('form-subtitle').innerText = 'Join us and start your journey today.';
            }
        }

        function showMessage(msg, isSuccess = false) {
            const box = document.getElementById('error-message');
            box.innerText = msg;
            box.className = isSuccess 
                ? "mb-6 p-4 bg-emerald-50 text-emerald-700 text-sm font-medium rounded-lg border border-emerald-200 text-center" 
                : "mb-6 p-4 bg-rose-50 text-rose-700 text-sm font-medium rounded-lg border border-rose-200 text-center animate-pulse";
            box.classList.remove('hidden');
        }

        function hideMessage() { document.getElementById('error-message').classList.add('hidden'); }

        function handleLogin(e) {
            e.preventDefault();
            hideMessage();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                const sessionData = { email: user.email, role: user.role, timestamp: Date.now() };
                document.getElementById('remember-me').checked 
                    ? localStorage.setItem('activeSession', JSON.stringify(sessionData)) 
                    : sessionStorage.setItem('activeSession', JSON.stringify(sessionData));
                window.location.replace('index.html');
            } else {
                showMessage('Invalid email or password. Please try again.');
            }
        }

        function handleSignup(e) {
            e.preventDefault();
            hideMessage();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];

            if (users.some(u => u.email === email)) {
                showMessage('An account with this email already exists.');
                return;
            }

            const newUser = { email, password, role: 'student' };
            users.push(newUser);
            localStorage.setItem('registeredUsers', JSON.stringify(users));
            sessionStorage.setItem('activeSession', JSON.stringify({ email: newUser.email, role: newUser.role, timestamp: Date.now() }));
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
